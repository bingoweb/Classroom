name: Project Quality Gate

on:
  push:
    branches:
      - ilk-surum-gelistirme
      - main
  pull_request:
    branches:
      - ilk-surum-gelistirme
      - main

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Execute Complete CI Gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: npm run gate:ci
