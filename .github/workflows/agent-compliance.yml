name: Agent Compliance

on:
  push:
    branches:
      - main
      - ilk-surum-gelistirme
  pull_request:

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run compliance policy check
        run: npm run test:policy

      - name: Run core tests
        run: npm run test:core
